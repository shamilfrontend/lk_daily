services:
  mongo:
    image: mongo:7
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ['CMD', 'mongosh', '--quiet', '--eval', 'db.adminCommand({ ping: 1 }).ok']
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - '4000:4000'
    environment:
      PORT: '4000'
      MONGO_URI: mongodb://mongo:27017/lk-daily
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET in .env}
      ADMIN_LOGIN: ${ADMIN_LOGIN:?set ADMIN_LOGIN in .env}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?set ADMIN_PASSWORD in .env}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173,http://localhost:4173}
      NODE_ENV: production
    depends_on:
      mongo:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://127.0.0.1:4000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 25s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Относительный путь: браузер ходит на тот же origin, nginx проксирует /api → api:4000
        VITE_API_URL: ${VITE_API_URL:-/api}
    ports:
      - '4173:4173'
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'wget', '-q', '--spider', 'http://127.0.0.1:4173/']
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s

volumes:
  mongo_data:
